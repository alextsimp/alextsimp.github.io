- year: '2018'
  title: Rarefied isothermal gas flow in a long circular tube due to oscillating pressure
    gradient
  authors: Tsimpoukis, A., Valougeorgis, D.
  journal: Microfluidics and Nanofluidics
  url: http://link.springer.com/10.1007/s10404-017-2024-2
  abstract: No abstract available.
- year: '2018'
  title: Pulsatile pressure driven rarefied gas flow in long rectangular ducts
  authors: Tsimpoukis, Alexandros, Valougeorgis, Dimitris
  journal: Physics of Fluids
  url: http://aip.scitation.org/doi/10.1063/1.5022353
  abstract: The pulsatile pressure driven fully developed flow of a rarefied gas through
    an orthogonal duct is investigated, based on the time-dependent linear Bhatnagar,
    Gross, and Krook equation, by decom- posing the flow into its steady and oscillatory
    parts. The investigation is focused on the oscillatory part, which is characterized
    by the gas rarefaction and oscillation parameters, the duct aspect ratio, and
    the accommodation coefficient. As the oscillation frequency is increased, the
    amplitude of all macroscopic quantities is decreased, while their phase angle
    lag is increased reaching the limit- ing value of $\pi$ /2. As the gas becomes
    more rarefied, higher frequencies are needed to trigger this behavior. At small
    and moderate frequencies, there is a critical degree of gas rarefaction, where
    a maximum flow rate is obtained. As the duct aspect ratio is decreased and tends
    to zero, the flow rate and mean wall shear stress amplitudes are increased, while
    their phase angle lags are slightly affected. The accommodation coefficient has
    a significant effect on the amplitude and a very weak one on the phase angle of
    the macroscopic quantities. The computation of the inertia and viscous forces
    clarifies when the flow consists of only one oscillating viscous region or of
    two regions, namely, the inviscid piston flow in the core and the oscillating
    Stokes layer at the wall with the velocity overshooting. Finally, the time average
    oscillatory pumping power is increased as the oscil- lation frequency is reduced
    and its maximum value is one half of the corresponding steady one.
