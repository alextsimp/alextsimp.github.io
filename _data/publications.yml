- year: '2014'
  title: Estimating Heating and Cooling Degree Days through an Urban Environment Using
    Publicly Available Sensors
  authors: Papakostas, Konstantinos, Martinopoulos, Georgios, Tsimpoukis, Alexandros
  journal: Applied Mechanics and Materials
  url: http://www.scientific.net/AMM.659.411 https://www.scientific.net/AMM.659.411
  abstract: In this paper, data from 12 meteorological stations located throughout
    the greater metropolitan area of Thessaloniki - Greece are used for the calculation
    of location specific monthly Heating (HDD) and Cooling (CDD) Degree Days utilizing
    hourly records of the last three years. The HDD are calculated for base temperatures
    of 15 and 18°C and the CDD for base temperatures of 22 and 24°C by compacting
    average hourly data. The results show that the HDD average value of the various
    locations examined in Thessaloniki during the examined period (2010-2013), as
    compared to the corresponding value for the city center, is increased from 19{\%}
    up to 48{\%} (depending on the base temperature). The difference in the average
    value of CDD for the specified time period is more pronounced, as differences
    range from -10{\%} to -40{\%} compared to the corresponding value for the city
    center.
