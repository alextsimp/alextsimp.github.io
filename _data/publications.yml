  authors: Alexandros Tsimpoukis, Nikos Vasileiadis, Giorgos Tatsios, Dimitris Valougeorgis
  journal: From Kinetic Theory to Turbulence Modeling
  url: https://link.springer.com/10.1007/978-981-19-6462-6_21
