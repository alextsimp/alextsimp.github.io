- year: '2021'
  title: Linear harmonic oscillatory rarefied gas flow with arbitrary frequency in
    comb finger blocks
  authors: Alexandros Tsimpoukis, Dimitris Valougeorgis
  journal: 'Sensors and Actuators A: Physical'
  url: https://doi.org/10.1016/j.sna.2021.112997
  abstract: The linear oscillatory two-dimensional rarefied gas flow in the zig-zag
    channel between the shuttle and stator fingers of typical comb elements, due to
    the harmonic motion of the shuttle finger with arbitrary frequency, is numerically
    investigated, via the linearized unsteady Shakhov kinetic model equation, subject
    to purely diffuse boundary conditions. The amplitude and phase distributions of
    the velocity components, normal and shear stresses, density and temperature are
    thoroughly investigated in the whole range of the gas rarefaction and oscillation
    parameters, characterizing the flow. The low, moderate and high flow oscillation
    regimes are defined by the ratio of the gas rarefaction over the oscillation parameters.
    It is shown that in the low oscillation regime the flow may be approximated by
    the corresponding steady-state analysis, while in the high oscillation one by
    the superposition of the associated oscillatory one-dimensional normal sound propagation
    and Couette flows. In the former case edge and compressibility effects are considerable
    and in the latter one the flow is characterized by gas trapping along the shuttle
    finger. In the moderate oscillation regime the fully oscillatory two-dimensional
    flow must be analysed. Here, the antiresonance and resonance states of the flow
    are considered. The ratios of the gas rarefaction over the oscillation parameters,
    where the average normal and shear stresses acting on the shuttle finger are minimized
    are computationally specified. Changing the main geometry parameters of the comb
    finger block, significantly affects the normal and shear stresses acting on the
    shuttle finger, mainly in the low oscillation regime. The present work may be
    applied to minimize the damping forces in comb finger blocks, as well as to optimize
    the design of new generation devices operating in moderate and high frequencies.
- year: '2021'
  title: The Half-Range Moment Method in Harmonically Oscillating Rarefied Gas Flows
  authors: Tatsios, Giorgos, Tsimpoukis, Alexandros, Valougeorgis, Dimitris
  journal: Fluids
  url: https://www.mdpi.com/2311-5521/6/1/17
  abstract: The formulation of the half-range moment method (HRMM), well defined in
    steady rarefied gas flows, is extended to linear oscillatory rarefied gas flows,
    driven by oscillating boundaries. The oscillatory Stokes (also known as Stokes
    second problem) and the oscillatory Couette flows, as representative ones for
    harmonically oscillating half-space and finite-medium flow setups respectively,
    are solved. The moment equations are derived from the linearized time-dependent
    BGK kinetic equation, operating accordingly over the positive and negative halves
    of the molecular velocity space. Moreover, the boundary conditions of the “positive”
    and “negative” moment equations are accordingly constructed from the half-range
    moments of the boundary conditions of the outgoing distribution function, assuming
    purely diffuse reflection. The oscillatory Stokes flow is characterized by the
    oscillation parameter, while the oscillatory Couette flow by the oscillation and
    rarefaction parameters. HRMM results for the amplitude and phase of the velocity
    and shear stress in a wide range of the flow parameters are presented and compared
    with corresponding results, obtained by the discrete velocity method (DVM). In
    the oscillatory Stokes flow the so-called penetration depth is also computed.
    When the oscillation frequency is lower than the collision frequency excellent
    agreement is observed, while when it is about the same or larger some differences
    are present. Overall, it is demonstrated that the HRMM can be applied to linear
    oscillatory rarefied gas flows, providing accurate results in a very wide range
    of the involved flow parameters. Since the computational effort is negligible,
    it is worthwhile to consider the efficient implementation of the HRMM to stationary
    and transient multidimensional rarefied gas flows.
