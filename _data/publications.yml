- year: '2025'
  title: Optimizing the performance of a novel compact integrated thermal storage
    system (MiniStor) under diverse climate conditions
  authors: Alexandros Tsimpoukis, Georgios Martinopoulos, Nikolaos Nikolopoulos
  journal: Green Energy and Sustainability
  url: https://www.pivotscipub.com/ges/5/4/0009
  abstract: The widespread adoption of renewable energy technologies requires adaptable
    and replicable energy storage solutions tailored to diverse climatic conditions.
    This paper presents a comprehensive study on the replication potential of a compact
    hybrid energy storage solution, called MiniStor across various European sites.
    The MiniStor system integrates solar photovoltaic-thermal (PVT) and solar thermal
    collectors, a thermochemical (TCM) reactor using an ammonia cycle, a heat pump
    with phase change material (PCM) storage, and a battery for electrical energy
    management in buildings. Its core innovation, the TCM reactor stores heat through
    reversible ammonia-calcium chloride reactions, providing heating during winter
    and cooling during summer. To assess its broader applicability, the system’s replication
    potential was evaluated across various European climates and residential typologies,
    focusing on single-family homes. Simulation, based on specific meteorological
    and building data, demonstrated that MiniStor can effectively operate across diverse
    regions demonstrating significant potential for RES integration across Europe,
    with renewable energy coverage ranging from 32% to over 88% depending on location
    for the worst-case scenario. This work contributes to accelerating the large-scale
    integration of renewable energy storage solutions in the built environment across
    Europe.
- year: '2025'
  title: Leveraging TRNSYS simulations of a single family house in Spain for renewable
    energy integration
  authors: George Dogkas, Alexandros Tsimpoukis, Milen Pérez Cammañ, Jesús Samaniego
    Muñoz, Juan Carlos del Castillo Garcia, Ola Gustafsson, Grigorios Itskos, Nikolaos
    Nikolopoulos
  journal: Green Energy and Sustainability
  url: https://www.pivotscipub.com/ges/5/4/0008
  abstract: A dynamic model was developed in TRNSYS® software package to simulate
    the thermal behavior of a single family house in Spain during a year. The model
    takes into consideration the characteristics of the building (orientation, insulation,
    thermal zones, etc.), heating and cooling devices, weather conditions and electric
    grid usage. Additionally, the model incorporates occupancy profiles, lighting,
    heat producing devices and infiltration to estimate thermal loads and photovoltaic
    production. So, with the utilization of the model, a characterization of the thermal
    and photovoltaic systems is accomplished, which can be used for the assessment
    of potential coupling with individual models of thermal energy storage solutions
    and comparison of cases with and without storage. As a result, the investigation
    of load shift strategies together with the exploitation of the photovoltaic energy
    source, will be feasible if the required input becomes available. According to
    the model, the annual thermal demands are 1618 kWh for space heating, 2358 kWh
    for space cooling and 1671 kWh for domestic hot water. The total electricity consumption
    of the heat pump and all circulating pumps is 1273 kWh, while the photovoltaic
    array produces 6512 kWh per year.
- year: '2024'
  title: 'A Comprehensive Approach to Nearly Zero Energy Buildings and Districts:
    Analysis of a Region Undergoing Energy Transition'
  authors: Georgios Martinopoulos, Alexandros Tsimpoukis, Vasileios Sougkakis, Petros
    Dallas, Komninos Angelakoglou, Paraskevi Giourka, Nikolaos Nikolopoulos
  journal: Energies 2024, Vol. 17, Page 5581
  url: https://www.mdpi.com/1996-1073/17/22/5581/htm https://www.mdpi.com/1996-1073/17/22/5581
  abstract: This paper explores the development of positive energy communities using
    Eordaia, Greece, as a case study. The approach combines building and district-level
    energy analysis to achieve nearly zero energy performance through retrofitting,
    district-level storage systems, and renewable energy technologies. A parametric
    analysis utilizing RETSCREEN Expert and EnergyPlan software determines the optimal
    mix of technologies based on technical and financial parameters, with Eordaia,
    a region in energy transition and part of the RESPONSE Horizon project, illustrating
    the practical benefits. It includes a neighborhood of 105 mixed-use properties
    and two municipal buildings where a range of renewable energy sources and energy
    efficiency measures are applied. Insulation, photovoltaic systems, LED lighting,
    predictive thermostats, and windows coated with nanotechnology are some of the
    key interventions considered. The findings show considerable reductions in CO2
    emissions and energy use, with payback periods ranging from 8.7 to 9.6 years.
    This study underscores the value of district-level strategies over individual
    building retrofits, highlighting cost savings and improved energy performance.
    These findings offer valuable insights for urban planners and policymakers aiming
    to transform urban areas into sustainable, positive energy districts, supporting
    the EU’s 2050 net-zero emissions goals.
- year: '2023'
